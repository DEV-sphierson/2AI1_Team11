<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction Result</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*,
*::before,
*::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* BODY */
body {
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364, #00c6ff);
    background-size: 800% 800%;
    animation: gradientMove 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* BACKGROUND ANIMATION */
@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* FLOATING SHAPES */
body::before,
body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: float 10s infinite ease-in-out;
}

body::before {
    width: 250px;
    height: 250px;
    top: -60px;
    left: -60px;
}

body::after {
    width: 300px;
    height: 300px;
    bottom: -80px;
    right: -80px;
    animation-delay: 4s;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(40px);}
}

.card {
    width: 420px;
    padding: 45px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
    position: relative;
    z-index: 1;
    animation: cardEnter 1s ease;
}

/* CARD ENTRY */
@keyframes cardEnter {
    from {
        opacity: 0;
        transform: translateY(60px) scale(0.8);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

h1 {
    font-size: 28px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

/* ICON */
.icon {
    font-size: 60px;
    margin-bottom: 10px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-15px);}
}

/* RESULT BOX */
.result-box {
    margin: 25px 0;
    padding: 20px;
    border-radius: 15px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 1px;
    transition: 0.4s;
    animation: glowPulse 2s infinite alternate;
}

.success {
    background: rgba(0,255,150,0.15);
    color: #00ffb3;
    box-shadow: 0 0 25px #00ffb3;
}

/* FAILURE */
.fail {
    background: rgba(255,50,100,0.15);
    color: #ff4d6d;
    box-shadow: 0 0 25px #ff4d6d;
}

/* GLOW ANIMATION */
@keyframes glowPulse {
    from { box-shadow: 0 0 15px rgba(255,255,255,0.3);}
    to { box-shadow: 0 0 35px rgba(255,255,255,0.8);}
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 14px 30px;
    margin-top: 20px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: 500;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    position: relative;
    overflow: hidden;
    transition: 0.4s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00c6ff;
}

/* BUTTON RIPPLE */
.btn::before {
    content: "";
    position: absolute;
    width: 0;
    height: 300%;
    background: rgba(255,255,255,0.2);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    transition: 0.6s;
}

.btn:hover::before {
    width: 120%;
}

/* RESPONSIVE */
@media (max-width: 500px) {
    .card {
        width: 90%;
        padding: 25px;
    }
    h1 {
        font-size: 22px;
    }
    .result-box {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="card">

    <h1>Prediction Result</h1>

    {% if prediction_text == "Survived" %}
        <div class="icon">🎉</div>
        <div class="result-box success">
            Passenger Survived
        </div>
    {% else %}
        <div class="icon">⚠️</div>
        <div class="result-box fail">
            Passenger Did Not Survive
        </div>
    {% endif %}

    <a href="/" class="btn">Try Again</a>

</div>

</body>
</html>
