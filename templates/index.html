<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Titanic Survival Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Animated Background */
body {
    height: 100vh;
    background: linear-gradient(270deg, #1d2671, #c33764, #00c6ff);
    background-size: 600% 600%;
    animation: gradientBG 12s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Floating Circles */
body::before, body::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    animation: float 8s infinite ease-in-out;
}

body::before {
    top: -50px;
    left: -50px;
}

body::after {
    bottom: -50px;
    right: -50px;
    animation-delay: 3s;
}

@keyframes float {
    0%,100% { transform: translateY(0px);}
    50% { transform: translateY(30px);}
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 40px;
    width: 420px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    color: white;
    animation: slideUp 1s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

/* Inputs */
.input-group {
    margin-bottom: 18px;
    position: relative;
}

label {
    font-size: 13px;
    opacity: 0.8;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    transition: 0.3s;
}

/* Glow Effect */
input:focus, select:focus {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 10px #00c6ff, 0 0 20px #0072ff;
    transform: scale(1.03);
}

/* Placeholder */
input::placeholder {
    color: #ddd;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

/* Button Hover Glow */
.btn:hover {
    transform: scale(1.07);
    box-shadow: 0 0 15px #00c6ff, 0 0 30px #0072ff;
}

/* Ripple Effect */
.btn::after {
    content: "";
    position: absolute;
    width: 0;
    height: 300%;
    background: rgba(255,255,255,0.2);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    transition: 0.6s;
}

.btn:hover::after {
    width: 120%;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}

/* Responsive */
@media(max-width: 500px) {
    .card {
        width: 90%;
        padding: 25px;
    }
}

</style>
</head>

<body>

<div class="card">
    <h2>🚢 Titanic Survival Predictor</h2>

    <form action="/predict" method="post">

        <div class="input-group">
            <label>Passenger Class</label>
            <input type="number" name="Pclass" placeholder="1, 2, or 3" required>
        </div>

        <div class="input-group">
            <label>Gender</label>
            <select name="Sex" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="input-group">
            <label>Age</label>
            <input type="number" step="any" name="Age" placeholder="Enter age" required>
        </div>

        <div class="input-group">
            <label>Siblings / Spouses</label>
            <input type="number" name="SibSp" placeholder="0,1,2..." required>
        </div>

        <div class="input-group">
            <label>Parents / Children</label>
            <input type="number" name="Parch" placeholder="0,1,2..." required>
        </div>

        <div class="input-group">
            <label>Fare</label>
            <input type="number" step="any" name="Fare" placeholder="Ticket fare" required>
        </div>

        <button type="submit" class="btn">Predict</button>

    </form>

    <div class="footer">
        🚀 Powered by Flask ML Model
    </div>
</div>

</body>
</html>
